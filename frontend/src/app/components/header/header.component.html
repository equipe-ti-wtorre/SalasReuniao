<header class="header">
  <div class="container header-content">
    <div class="title-block">
      <div class="icon-wrap">
        <i class="fa-solid fa-book-bookmark app-icon" aria-hidden="true"></i>
      </div>
      <div>
        <h1 class="font-display">Gestão de Salas</h1>
      </div>
    </div>

    <nav class="tabs" role="tablist">
      @for (tab of uiConfig.getTabs(); track tab.id) {
        <button
          type="button"
          role="tab"
          class="tab"
          [class.tab-active]="activeTab === tab.id"
          (click)="onTabClick(tab.id)"
        >
          {{ tab.label }}
        </button>
      }
      <button
        type="button"
        role="tab"
        class="tab"
        [class.tab-active]="activeTab === reservasTabId"
        (click)="onTabClick(reservasTabId)"
      >
        Reservas
      </button>
    </nav>

    <button type="button" class="refresh-btn" (click)="refresh.emit()" title="Atualizar disponibilidade">
      <i class="fa-solid fa-arrows-rotate refresh-icon" aria-hidden="true"></i>
      <span class="refresh-label">Atualizar disponibilidade</span>
    </button>
  </div>
</header>
