# aaPanel — site CalendarsFront (salas.allianzparque.com.br)
# Copiar para o vhost no painel ou substituir o bloco server equivalente.
# Build: cd frontend && npm run build  →  dist/frontend-app/browser/
# Backend (obrigatório para tablet/check-in): cd backend && npm run build && pm2 restart ...
# Teste: curl -H "x-localidade: Allianz" https://salas.allianzparque.com.br/api/rooms/EMAIL/kiosk-settings

server
{
    listen 80;
    listen 443 ssl http2;
    server_name salas.allianzparque.com.br;

    index index.html;
    root /www/server/Calendars/frontend/dist/frontend-app/browser/;

    #CERT-APPLY-CHECK--START
    # Validação SSL (Let's Encrypt) — não apagar
    include /www/server/panel/vhost/nginx/well-known/CalendarsFront.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443) {
        return 301 https://$host$request_uri;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate     /www/server/panel/vhost/cert/CalendarsFront/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/CalendarsFront/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;
    error_page 497 https://$host$request_uri;
    #SSL-END

    # SPA Angular: não usar rewrite de Node (proxy total para porta Node).
    # Se existir node_CalendarsFront.conf com proxy_pass em /, desative ou esvazie esse ficheiro.
    # include /www/server/panel/vhost/rewrite/node_CalendarsFront.conf;

    # Ficheiros sensíveis
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README\.md|package\.json|package-lock\.json|\.env|node_modules) {
        return 404;
    }

    # Site estático — não executar PHP (reduz ruído de scanners nos logs)
    location ~ \.php$ {
        return 404;
    }

    # Backend Node (PM2 na porta 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets com hash no nome — cache longo
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Angular — fallback para index.html (rotas do router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /www/wwwlogs/CalendarsFront.log;
    error_log  /www/wwwlogs/CalendarsFront.error.log;
}
